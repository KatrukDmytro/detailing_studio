services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: detailing-db
    environment:
      POSTGRES_DB: detailing_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - detailing-net

  # ── Spring Boot Backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: detailing-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/detailing_studio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - detailing-net

  # ── Vue.js Frontend (nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: detailing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - detailing-net

volumes:
  pgdata:

networks:
  detailing-net:
    driver: bridge
