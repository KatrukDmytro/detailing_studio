spring:
  application:
    name: DetailingStudio

  # PostgreSQL configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/detailing_studio
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Spring Security
  security:
    user:
      name: admin
      password: brisa2026

server:
  port: 8080

# Application custom properties
app:
  admin:
    username: admin
    password: brisa2026
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

---
# H2 profile for development without PostgreSQL
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/detailing_studio;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
