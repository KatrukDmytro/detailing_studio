spring:
  application:
    name: DetailingStudio

  # PostgreSQL configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql:///detailing_studio?cloudSqlInstance=project-f0c6dffa-7d80-4aef-9b0:europe-west3:a767891abrisa&socketFactory=com.google.cloud.sql.postgres.SocketFactory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:numb151515!A}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
